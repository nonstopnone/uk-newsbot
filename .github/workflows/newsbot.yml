name: Run Breaking UK News Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      manual_story_url:
        required: false
        default: ''
      manual_story_title:
        required: false
        default: ''

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 praw python-dateutil google-genai

      - name: Execute News Bot
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD: ${{ secrets.REDDITPASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MANUAL_STORY_URL: ${{ github.event.inputs.manual_story_url || '' }}
          MANUAL_STORY_TITLE: ${{ github.event.inputs.manual_story_title || '' }}
        run: python main.py

      - name: Commit and Push State Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted_urls.txt ai_cache.json metrics.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Automated state sync: Update logs and tracking files [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          else
            echo "No state modifications found. Skipping commit."
          fi
