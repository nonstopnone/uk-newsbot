name: Run Breaking UK News Bot
on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:
    inputs:
      manual_story_url:
        required: false
        default: ''
      manual_story_title:
        required: false
        default: ''
jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 praw python-dateutil google-genai cryptography

      - name: Execute News Bot
        env:
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD:       ${{ secrets.REDDITPASSWORD }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          REASONING_PASSCODE:   ${{ secrets.REASONING_PASSCODE }}
          MANUAL_STORY_URL:     ${{ github.event.inputs.manual_story_url   || '' }}
          MANUAL_STORY_TITLE:   ${{ github.event.inputs.manual_story_title || '' }}
        run: python newsbot.py

      - name: Commit and Push State Changes
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # -f so a .gitignore entry can't silently skip the encrypted log
          git add -f posted_urls.txt ai_cache.json metrics.json ai_reasoning_log.jsonl.enc 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No state modifications. Skipping commit."
            exit 0
          fi

          git commit -m "Automated state sync [skip ci]"

          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected, syncing with remote (attempt $attempt)..."
            git pull --rebase origin ${{ github.ref_name }} || git rebase --abort || true
          done
          echo "Push failed after retries" >&2
          exit 1
