name: UK News Bot

on:
  schedule:
    - cron: '*/15 * * * *'

  workflow_dispatch:
    inputs:
      MANUAL_MODE:
        description: 'Submission mode (select one box)'
        required: true
        default: 'with_check'
        type: choice
        options:
          - with_check
          - with_ai_check
          - pre_approved

      MANUAL_TITLE:
        description: 'Article title (required for manual submission)'
        required: true
        type: string

      MANUAL_LINK:
        description: 'Full URL of the article (required for manual submission)'
        required: true
        type: string

      MANUAL_SOURCE:
        description: 'Source name (optional, defaults to "Manual Submission")'
        required: false
        default: 'Manual Submission'
        type: string

      MANUAL_SUMMARY:
        description: 'Optional article summary or excerpt'
        required: false
        type: string

      MANUAL_TARGET:
        description: 'Target subreddit (only used in pre_approved mode)'
        required: false
        default: 'UK'
        type: choice
        options:
          - UK
          - INTL

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-newsbot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
     
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
         
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser praw beautifulsoup4 requests python-dateutil google-genai
         
      - name: Run newsbot
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD: ${{ secrets.REDDITPASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Manual submission parameters (passed to the Python script)
          MANUAL_MODE: ${{ github.event.inputs.MANUAL_MODE }}
          MANUAL_TITLE: ${{ github.event.inputs.MANUAL_TITLE }}
          MANUAL_LINK: ${{ github.event.inputs.MANUAL_LINK }}
          MANUAL_SOURCE: ${{ github.event.inputs.MANUAL_SOURCE }}
          MANUAL_SUMMARY: ${{ github.event.inputs.MANUAL_SUMMARY }}
          MANUAL_TARGET: ${{ github.event.inputs.MANUAL_TARGET }}
        run: python -u newsbot.py
       
      - name: Commit Logs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Ensure files exist before adding to prevent 'pathspec' errors
          touch run_log.txt posted_urls.txt ai_cache.json metrics.json
          git add run_log.txt posted_urls.txt ai_cache.json metrics.json
          git add posted_urls_*.txt || true
          git commit -m "Update Main Bot logs [skip ci]" || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
