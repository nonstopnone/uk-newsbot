name: BreakingUKNewsBot

on:
  schedule:
    - cron: "0 */0.3 * * *"

  workflow_dispatch:
    inputs:
      manual_story_url:
        description: "URL of story to post (leave blank for normal automated run)"
        required: false
        default: ""
        type: string
      manual_story_title:
        description: "Title override — required for sites that block scraping (e.g. Sky News)"
        required: false
        default: ""
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-genai

      - name: Restore deduplication file
        uses: actions/cache@v4
        with:
          path: posted_urls.txt
          key: dedup-${{ github.run_id }}
          restore-keys: |
            dedup-

      - name: Restore AI cache
        uses: actions/cache@v4
        with:
          path: ai_cache.json
          key: ai-cache-${{ github.run_id }}
          restore-keys: |
            ai-cache-

      - name: Run newsbot
        env:
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD:       ${{ secrets.REDDITPASSWORD }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          MANUAL_STORY_URL:     ${{ github.event.inputs.manual_story_url }}
          MANUAL_STORY_TITLE:   ${{ github.event.inputs.manual_story_title }}
        run: python newsbot.py
