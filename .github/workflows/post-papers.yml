name: Daily Newspaper Bot

# ──────────────────────────────────────────────────────────────────────────────
# What this workflow does:
#   Runs the newspaper_bot.py script on a schedule (every 30 minutes through
#   the evening + overnight) to mirror Sky News' "Tomorrow's papers" rolling
#   blog into a subreddit. Each newspaper front page becomes one Reddit image
#   post with the Sky News blurb as the first comment.
#
# Schedule (UTC):
#   22:00, 22:30, 23:00, 23:30, then 00:00–12:00 every 30 min.
#   Note: GitHub Actions cron is best-effort and can drift up to ~30 minutes.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/30 22,23 * * *'   # 22:00–23:30 UTC
    - cron: '*/30 0-12 * * *'    # 00:00–12:00 UTC
  workflow_dispatch:               # allows manual triggering from the Actions tab

# Only one bot run at a time. If a scheduled run starts while a previous one
# is still posting, the new one queues rather than racing. We never cancel
# an in-progress run (we want it to finish posting whatever it's mid-upload).
concurrency:
  group: newspaper-bot
  cancel-in-progress: false

jobs:
  post-news:
    name: Scrape Sky News and post to Reddit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15           # safety cap so a stuck run doesn't burn minutes

    steps:
      # ─── 1. Get the code ────────────────────────────────────────────────
      - name: "1. Checkout repository"
        uses: actions/checkout@v4

      # ─── 2. Python toolchain ────────────────────────────────────────────
      - name: "2. Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip                  # caches the pip download cache between runs

      # ─── 3. Install Python packages ─────────────────────────────────────
      # Deps are listed inline here (no requirements.txt) so this workflow is
      # self-contained and your repo's existing requirements.txt is untouched.
      - name: "3. Install Python packages (playwright, praw, requests)"
        run: |
          echo "::group::Installing Python packages"
          python -m pip install --upgrade pip
          python -m pip install \
            "playwright>=1.44.0" \
            "praw>=7.7.0" \
            "requests>=2.31.0"
          echo "::endgroup::"
          echo "Installed package versions:"
          python -m pip list | grep -Ei "playwright|praw|requests"

      # ─── 4. Cache Playwright's Chromium browser ─────────────────────────
      # Playwright downloads ~150MB of Chromium each run unless we cache it.
      - name: "4. Restore cached Playwright Chromium browser"
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: "5a. Install Chromium (cache miss — first run only)"
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: |
          echo "No cached browser found — downloading Chromium + system deps..."
          python -m playwright install --with-deps chromium

      - name: "5b. Install Chromium system deps (cache hit — fast path)"
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: |
          echo "Using cached browser, installing only system dependencies..."
          python -m playwright install-deps chromium

      # ─── 6. Run the bot ─────────────────────────────────────────────────
      - name: "6. Run the newspaper bot"
        env:
          # Required Reddit credentials (see README for how to obtain them)
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD:       ${{ secrets.REDDITPASSWORD }}

          # Optional: leave the secret empty in the repo to fall back to defaults
          USER_AGENT:           ${{ secrets.USER_AGENT }}
          SUBREDDIT:            ${{ secrets.SUBREDDIT }}
          SKY_ARTICLE_ID:       ${{ secrets.SKY_ARTICLE_ID }}
        run: |
          echo "::group::Run context"
          echo "Triggered by:  ${{ github.event_name }}"
          echo "UTC time now:  $(date -u +'%Y-%m-%d %H:%M:%S')"
          echo "UK time now:   $(TZ=Europe/London date +'%Y-%m-%d %H:%M:%S %Z')"
          echo "::endgroup::"
          python newspaper_bot.py
