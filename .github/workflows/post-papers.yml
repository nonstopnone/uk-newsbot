name: Post BBC Papers to Reddit

on:
  schedule:
    - cron: "*/30 22,23 * * *"   # 22:00–23:59 UTC
    - cron: "*/30 0-12 * * *"    # 00:00–12:59 UTC
  workflow_dispatch:              # allow manual trigger

concurrency:
  group: newspaper-bot
  cancel-in-progress: false       # never cancel a run mid-post

jobs:
  post-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────────────
      - name: "Step 1: Checkout repository"
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ────────────────────────────────────────────
      - name: "Step 2: Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Step 3: Install dependencies (no requirements.txt) ───────────────
      - name: "Step 3: Install dependencies"
        run: pip install praw requests beautifulsoup4

      # ── Step 4: Run the bot ──────────────────────────────────────────────
      - name: "Step 4: Run newspaper bot"
        env:
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD:       ${{ secrets.REDDITPASSWORD }}
          USER_AGENT:           ${{ secrets.USER_AGENT }}
          SUBREDDIT:            ${{ secrets.SUBREDDIT }}
        run: python newspaper_bot.py
