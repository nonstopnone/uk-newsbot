name: Post episode threads

on:
  schedule:
    # 7am UK window: episode-thread check (Robron days) + a morning spoilers sweep.
    # BST 06:00 UTC / GMT 07:00 UTC -> cover 06:00-08:00.
    - cron: "*/15 6-8 * * *"
    # Evening spoilers sweep (~18:00 UK). BST 17:00 UTC / GMT 18:00 UTC.
    - cron: "0 17-18 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Force a job (auto/episode/spoilers)"
        default: "spoilers"
      dry_run:
        description: "Dry run (true/false)"
        default: "true"
      force_window:
        description: "Ignore the time/window gate (true/false)"
        default: "true"
      robron_override:
        description: "Episode detection: auto (detect) / on (force post) / off (suppress)"
        default: "auto"

concurrency:
  group: post-thread
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install praw requests beautifulsoup4

      - name: Run bot
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD: ${{ secrets.REDDITPASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JOB: ${{ github.event.inputs.job || 'auto' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_WINDOW: ${{ github.event.inputs.force_window || 'false' }}
          ROBRON_OVERRIDE: ${{ github.event.inputs.robron_override || 'auto' }}
          SUBREDDIT: robronaddicts
        run: python robronbot.py
