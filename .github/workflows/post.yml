name: Post episode threads

on:
  schedule:
    # Morning / ITVX early-access window (UK ~07:00).
    #   BST: 06:00-07:30 UTC   GMT: 07:00-08:30 UTC
    - cron: "*/15 6-8 * * *"
    # Evening / ITV1 broadcast window (UK ~20:00).
    #   BST: 19:00-20:30 UTC   GMT: 20:00-21:30 UTC
    - cron: "*/15 19-21 * * *"
  workflow_dispatch:
    inputs:
      phase:
        description: "Force a phase (early/broadcast/auto)"
        default: "auto"
      dry_run:
        description: "Dry run (true/false)"
        default: "true"

concurrency:
  group: post-thread
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD: ${{ secrets.REDDITPASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PHASE: ${{ github.event.inputs.phase || 'auto' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SUBREDDIT: robronaddicts
        run: python robronbot.py
