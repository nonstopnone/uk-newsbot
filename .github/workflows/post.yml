name: Post episode threads

on:
  schedule:
    - cron: "*/15 6-8 * * *"
    - cron: "*/15 19-21 * * *"
  workflow_dispatch:
    inputs:
      phase:
        description: "Force a phase (early/broadcast/auto)"
        default: "broadcast"
      dry_run:
        description: "Dry run (true/false)"
        default: "true"
      force_phase:
        description: "Ignore time window check (true/false)"
        default: "true"

concurrency:
  group: post-thread
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install praw requests

      - name: Run bot
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDITPASSWORD: ${{ secrets.REDDITPASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PHASE: ${{ github.event.inputs.phase || 'auto' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_PHASE: ${{ github.event.inputs.force_phase || 'false' }}
          SUBREDDIT: robronaddicts
        run: python robronbot.py
